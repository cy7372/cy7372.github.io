<footer class="footer">

            <div class="col-12 col-md-6 mb-1 mb-md-0">
                <div class="text-muted">
                    <i>Last updated: {{ "now" | date: "%b %Y" }}</i>
                </div>
            </div>
            <div class="col-12 col-md-12 col-md-6 text-md-right">
                <div class="text-muted">
                    © {{ site.time | date: "%Y" }} Yu Chai. All rights reserved.
                </div>
            </div>
        </div>
    </div>
</footer>
