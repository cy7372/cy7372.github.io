short_bio: >-
  <p>
    I work at the intersection of AI and the physical world — marine remote sensing, weather forecasting, underwater robotics. I care more about solving real operational problems than chasing benchmarks. When data is scarce, noisy, or refuses to follow the rules, that's where I want to be.
  </p>

  <p>
    Before my postgraduate studies, I was deep in AI for coding — cross-lingual and cross-task transfer learning, trying to make models generalize with limited labeled data. I also won the National First Prize in the TI Cup Electronic Design Contest, which started my journey from hardware to software to somewhere in between.
  </p>

  <p>
    These days I focus on data-efficient deep learning for MetOcean applications: transfer learning, few-shot adaptation, spatiotemporal forecasting. I also build AI agents for weather and maritime services. Beyond my main area, I'm curious about materials modeling and EDA — wherever domain knowledge and deep learning collide.
  </p>

  <p>
    If any of this resonates, feel free to reach out.
  </p>


